blueprint:
  name: Night lights
  description: >
    Turn a device on near sunset and off near sunrise.
    Optionally turn off during rain and based on temperature.
  domain: automation
  source_url: https://github.com/aenea/blueprints/blob/main/home/night_lights.yaml

  input:
    target_device:
      name: Target
      description: Device to turn on and off
      selector:
        entity:
          domain:
            - light
            - switch
          multiple: true

    start_elevation:
      name: Turn on elevation
      description: The device turns on when the sun drops to this elevation
      selector:
        number:
          min: -90
          max: 90
          unit_of_measurement: degrees
          step: 1
          mode: slider

    stop_elevation:
      name: Turn off elevation
      description: The device turns off when the sun climbs to this elevation
      selector:
        number:
          min: -90
          max: 90
          unit_of_measurement: degrees
          step: 1
          mode: slider

    rain_blocker:
      name: Turn off while raining
      description: Turn off the device while it is raining
      default: false
      selector:
        boolean: {}

    minimum_temperature:
      name: Minimum temperature (optional)
      description: Turn off the device if the temperature is below this value
      selector:
        number:
          min: -10
          max: 100
          unit_of_measurement: °F
          step: 1
          mode: slider

mode: single

variables:
  rain_blocker: !input rain_blocker
  target_device: !input target_device
  start_elevation: !input start_elevation
  stop_elevation: !input stop_elevation
  minimum_temperature: !input minimum_temperature

trigger:
  - platform: numeric_state
    entity_id: sun.sun
    attribute: elevation
    below: !input start_elevation

  - platform: numeric_state
    entity_id: sun.sun
    attribute: elevation
    above: !input stop_elevation

  - platform: state
    entity_id: binary_sensor.davis_vantage_is_raining
    from: 'off'
    to: 'on'

  - platform: state
    entity_id: binary_sensor.davis_vantage_is_raining
    from: 'on'
    to: 'off'

  - platform: numeric_state
    entity_id: sensor.davis_vantage_temperature
    below: !input minimum_temperature

condition:
  - condition: state
    entity_id: binary_sensor.vacation_mode
    state: 'off'

action:
  - choose:
      - conditions:
          - condition: numeric_state
            entity_id: sensor.davis_vantage_temperature
            below: !input minimum_temperature
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: !input target_device

      - conditions:
          - condition: state
            entity_id: binary_sensor.davis_vantage_is_raining
            state: 'on'
          - condition: template
            value_template: "{{ rain_blocker }}"
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: !input target_device

      - conditions:
          - condition: numeric_state
            entity_id: sun.sun
            attribute: elevation
            above: !input stop_elevation
          - condition: template
            value_template: "{{ state_attr('sun.sun', 'rising') == true }}"
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: !input target_device

      - conditions:
          - condition: numeric_state
            entity_id: sun.sun
            attribute: elevation
            below: !input start_elevation
          - condition: numeric_state
            entity_id: sensor.davis_vantage_temperature
            above: !input minimum_temperature
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.davis_vantage_is_raining
                    state: 'on'
                  - condition: template
                    value_template: "{{ not rain_blocker }}"
                sequence:
                  - service: homeassistant.turn_on
                    target:
                      entity_id: !input target_device

              - conditions:
                  - condition: state
                    entity_id: binary_sensor.davis_vantage_is_raining
                    state: 'on'
                  - condition: template
                    value_template: "{{ rain_blocker }}"
                sequence:
                  - service: homeassistant.turn_off
                    target:
                      entity_id: !input target_device

            default:
              - service: homeassistant.turn_on
                target:
                  entity_id: !input target_device

    default: []
